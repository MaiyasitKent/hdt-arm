controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # List of controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Optional: Individual joint position controllers for testing
    # shoulder_roll_position_controller:
    #   type: position_controllers/JointGroupPositionController
    
# Joint State Broadcaster - publishes joint states to /joint_states topic
joint_state_broadcaster:
  ros__parameters:
    joints:
      - shoulder_pitch_joint
      - shoulder_roll_joint
      - upperarm_joint
      - elbow_joint
      - wrist_joint
    interfaces:
      - position
      - velocity

# Arm Controller - main controller for MoveIt2
arm_controller:
  ros__parameters:
    joints:
      - shoulder_roll_joint
      - shoulder_pitch_joint
      - upper_arm_joint
      - elbow_joint
      - wrist_joint
    
    command_interfaces:
      - position
    
    state_interfaces:
      - position
      - velocity
    
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    
    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: true
    
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      
    # PID gains (tune these based on your robot)
    gains:
      shoulder_pitch_joint:
        p: 100.0
        d: 10.0
        i: 0.01
        i_clamp: 1.0
      shoulder_roll_joint:
        p: 100.0
        d: 10.0
        i: 0.01
        i_clamp: 1.0
      upperarm_joint:
        p: 100.0
        d: 10.0
        i: 0.01
        i_clamp: 1.0
      elbow_joint:
        p: 100.0
        d: 10.0
        i: 0.01
        i_clamp: 1.0
      wrist_joint:
        p: 50.0
        d: 5.0
        i: 0.01
        i_clamp: 1.0

# Optional: Position controllers for manual testing
shoulder_pitch_position_controller:
  ros__parameters:
    joints:
      - shoulder_pitch_joint
    interface_name: position

shoulder_roll_position_controller:
  ros__parameters:
    joints:
      - shoulder_roll_joint
    interface_name: position

upperarm_position_controller:
  ros__parameters:
    joints:
      - upperarm_joint
    interface_name: position

elbow_position_controller:
  ros__parameters:
    joints:
      - elbow_joint
    interface_name: position

wrist_position_controller:
  ros__parameters:
    joints:
      - wrist_joint
    interface_name: position