sim:
  controller_manager:
    ros__parameters:
      update_rate: 1000
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

  arm_controller:
    ros__parameters:
      joints:
        - shoulder_pitch_joint
        - shoulder_roll_joint
        - upperarm_joint
        - elbow_joint
        - wrist_joint
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      allow_partial_joints_goal: false
      constraints:
        stopped_velocity_tolerance: 0.01
        goal_time: 5.0